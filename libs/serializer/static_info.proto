syntax = "proto3";

package gb_ser;

message Node {
    uint64 id = 1;
    uint64 type = 2;
    string label = 3;
    uint64 parent_id = 4; // 0 if no parent
}

message Cluster {
    uint64 id = 1;
    uint64 type = 2;
    string label = 3;
    uint64 parent_id = 4;
    repeated uint64 child_node_ids = 5;
    repeated uint64 child_cluster_ids = 6;
}

message Edge {
    uint64 left_id = 1;
    uint64 right_id = 2;
    uint64 type = 3;
    string label = 4;
}

message Graph {
    repeated Node nodes = 1;
    repeated Cluster clusters = 2;
    repeated Edge edges = 3;
}